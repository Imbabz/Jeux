<style>
/* reset minimal */
*{margin:0;padding:0;box-sizing:border-box}
/* ===== Farland MJ — thème sombre, mobile-first, gros boutons ===== */
:root {
  --bg:        #14110f;
  --bg-2:      #1e1a17;
  --bg-3:      #2a2420;
  --card:      #221d1a;
  --line:      #3a322c;
  --txt:       #ece3d8;
  --txt-dim:   #b3a695;
  --accent:    #c9a24b;   /* or vieilli */
  --accent-2:  #d9773b;   /* braise */
  --read:      #2b3a4a;   /* bleu lecture à voix haute */
  --read-line: #4a6c86;
  --danger:    #8f3b34;
  --ok:        #4a7a4a;
  --radius:    14px;
  --tap:       52px;      /* cible tactile mini */
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--txt); }
body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 17px; line-height: 1.5;
  padding-bottom: 84px;            /* place pour la nav */
  -webkit-text-size-adjust: 100%;
}
h1, h2, h3 { font-family: Georgia, "Times New Roman", serif; line-height: 1.2; }
a { color: var(--accent); }

/* ---- En-tête ---- */
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: linear-gradient(180deg, #1e1a17, #14110f);
  border-bottom: 1px solid var(--line);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
}
.topbar .logo { font-size: 22px; }
.topbar h1 { font-size: 18px; margin: 0; color: var(--accent); font-weight: 600; }
.topbar .sub { font-size: 12px; color: var(--txt-dim); margin-left: auto; }

/* ---- Contenu ---- */
main { padding: 14px; max-width: 820px; margin: 0 auto; }
.view { display: none; animation: fade .18s ease; }
.view.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
}
.muted { color: var(--txt-dim); }
.small { font-size: 14px; }
.center { text-align: center; }
.tag {
  display: inline-block; font-size: 12px; padding: 2px 9px; border-radius: 20px;
  background: var(--bg-3); color: var(--txt-dim); border: 1px solid var(--line);
  margin: 2px 4px 2px 0;
}
.tag.cr { background: #3a2c1a; color: var(--accent); border-color: #5a4526; }

/* ---- Boutons ---- */
button, .btn {
  font: inherit; cursor: pointer; border: 1px solid var(--line);
  background: var(--bg-3); color: var(--txt);
  border-radius: 12px; padding: 12px 14px; min-height: var(--tap);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
button:active, .btn:active { transform: scale(.97); }
.btn-accent { background: var(--accent); color: #221a08; border-color: var(--accent); font-weight: 600; }
.btn-block { display: flex; width: 100%; margin-bottom: 10px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-ghost { background: transparent; }

/* ---- Navigation basse ---- */
nav.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  display: flex; background: #171310; border-top: 1px solid var(--line);
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav.tabbar button {
  flex: 1; flex-direction: column; gap: 2px; background: none; border: none;
  color: var(--txt-dim); min-height: 60px; padding: 4px; font-size: 11px; border-radius: 10px;
}
nav.tabbar button .ic { font-size: 22px; line-height: 1; }
nav.tabbar button.active { color: var(--accent); background: #221d18; }

/* ---- Lecture à voix haute (encadré joueur) ---- */
.readbox {
  background: var(--read); border-left: 5px solid var(--read-line);
  border-radius: 10px; padding: 14px 16px; margin: 10px 0;
  font-size: 19px; line-height: 1.6;
}
.readbox p { margin: 0 0 12px; }
.readbox p:last-child { margin-bottom: 0; }
.readbox .label { font-size: 12px; letter-spacing: .5px; text-transform: uppercase;
  color: #a9cbe4; font-family: sans-serif; display: block; margin-bottom: 8px; }

/* ---- Notes MJ ---- */
.gmbox { margin: 10px 0; }
.gmbox .label { font-size: 12px; letter-spacing: .5px; text-transform: uppercase;
  color: var(--accent-2); display: block; margin-bottom: 6px; }
.gmbox ul { margin: 0; padding-left: 18px; }
.gmbox li { margin-bottom: 7px; }

/* ---- Scène : titre / lieu ---- */
.scene-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.scene-head h2 { margin: 0; font-size: 22px; color: var(--accent); }
.scene-loc { font-size: 13px; color: var(--txt-dim); }
.progress { font-size: 12px; color: var(--txt-dim); margin-bottom: 10px; }

/* ---- Choix ---- */
.choices { margin-top: 14px; }
.choices .label { font-size: 12px; text-transform: uppercase; letter-spacing:.5px; color: var(--txt-dim); margin-bottom: 8px; display:block;}
.choice {
  width: 100%; justify-content: space-between; text-align: left;
  background: var(--bg-2); border: 1px solid var(--line); font-size: 17px;
  padding: 14px 16px; margin-bottom: 10px; border-radius: 12px;
}
.choice .arrow { color: var(--accent); font-size: 20px; }

/* ---- Monstres liés dans une scène ---- */
.mini-mob {
  display: inline-flex; align-items: center; gap: 6px; background: var(--bg-3);
  border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; margin: 3px 6px 3px 0;
  font-size: 15px; color: var(--txt);
}
.mini-mob .cr { color: var(--accent); font-size: 12px; }

/* ---- Trésor ---- */
.loot { list-style: none; padding: 0; margin: 6px 0 0; }
.loot li { padding: 6px 0 6px 24px; position: relative; border-bottom: 1px dashed var(--line); }
.loot li:before { content: "◆"; position: absolute; left: 4px; color: var(--accent); }

/* ---- Liste scénarios / cartes cliquables ---- */
.pick {
  display: block; width: 100%; text-align: left; background: var(--card);
  border: 1px solid var(--line); border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; color: var(--txt);
}
.pick h3 { margin: 0 0 4px; color: var(--accent); font-size: 20px; }
.pick .meta { font-size: 13px; color: var(--txt-dim); margin-bottom: 8px; }
.pick p { margin: 0; font-size: 15px; color: var(--txt); }

/* ---- Dés ---- */
.dice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.dice-grid button { flex-direction: column; height: 76px; font-size: 20px; font-weight: 600; }
.dice-grid button small { font-size: 11px; color: var(--txt-dim); font-weight: 400; }
.dice-result {
  text-align: center; padding: 18px; margin: 12px 0;
  background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius);
}
.dice-result .total { font-size: 56px; font-weight: 800; color: var(--accent); line-height: 1; }
.dice-result .detail { color: var(--txt-dim); font-size: 15px; margin-top: 8px; }
.dice-result .crit { color: var(--ok); } .dice-result .fail { color: var(--danger); }
.d20-ctrl { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 10px 0; }
.d20-ctrl input { width: 64px; }
.adv-toggle button { flex: 1; }
.adv-toggle button.on { background: var(--accent); color: #221a08; border-color: var(--accent); }
input[type=number], input[type=text] {
  font: inherit; background: var(--bg); color: var(--txt); border: 1px solid var(--line);
  border-radius: 10px; padding: 10px 12px; min-height: var(--tap);
}
.roll-log { margin-top: 8px; }
.roll-log .row { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid var(--line); font-size: 15px; }
.roll-log .row b { color: var(--accent); }

/* ---- Fiche perso ---- */
.abil-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
.abil {
  background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px;
  padding: 8px; text-align: center; cursor: pointer;
}
.abil .name { font-size: 11px; color: var(--txt-dim); text-transform: uppercase; }
.abil .score { font-size: 22px; font-weight: 700; }
.abil .mod { font-size: 14px; color: var(--accent); }
.stat-line { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0; }
.stat-line .box { background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; flex: 1; text-align: center; min-width: 80px; }
.stat-line .box .k { font-size: 11px; color: var(--txt-dim); text-transform: uppercase; }
.stat-line .box .v { font-size: 20px; font-weight: 700; }
.chip-list { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--bg-3); border: 1px solid var(--line); border-radius: 20px; padding: 6px 12px; font-size: 14px; }
.chip.roll { cursor: pointer; }
.chip.roll:active { background: var(--accent); color: #221a08; }

/* ---- Recherche ---- */
.search { width: 100%; margin-bottom: 12px; }

/* ---- Divers ---- */
.section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--accent-2); margin: 18px 0 8px; }
details { border: 1px solid var(--line); border-radius: 10px; padding: 4px 12px; margin-bottom: 10px; background: var(--bg-2); }
details summary { cursor: pointer; padding: 10px 0; font-weight: 600; color: var(--accent); }
details[open] summary { border-bottom: 1px solid var(--line); margin-bottom: 8px; }
.kv { margin: 4px 0; } .kv b { color: var(--accent); }
hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
.floating-hint { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color:#221a08; padding: 10px 18px; border-radius: 30px;
  font-size: 14px; font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,.4); z-index: 60;
  opacity: 0; pointer-events: none; transition: opacity .2s; }
.floating-hint.show { opacity: 1; }

</style>
</head>
<body>
<header class="topbar">
  <span class="logo">🐉</span>
  <h1>Farland <span class="muted" style="font-weight:400;font-size:14px">— MJ</span></h1>
  <span class="sub" id="topbar-sub">Compagnon de table</span>
</header>
<main>
  <section id="view-jeu" class="view active"></section>
  <section id="view-des" class="view"></section>
  <section id="view-perso" class="view"></section>
  <section id="view-bestiaire" class="view"></section>
  <section id="view-univers" class="view"></section>
</main>
<div class="floating-hint" id="hint"></div>
<nav class="tabbar">
  <button data-tab="jeu" class="active"><span class="ic">📖</span>Aventure</button>
  <button data-tab="des"><span class="ic">🎲</span>Dés</button>
  <button data-tab="perso"><span class="ic">🛡️</span>Persos</button>
  <button data-tab="bestiaire"><span class="ic">👹</span>Bestiaire</button>
  <button data-tab="univers"><span class="ic">🌍</span>Univers</button>
</nav>
<script>
/* ============================================================
   UNIVERS DE FARLAND — Données de référence (World of Farland)
   Source : farlandworld.com (setting gratuit, compatible D&D 5e)
   Contenu résumé/adapté en français pour l'usage du MJ.
   ============================================================ */

window.FARLAND_LORE = {

  intro: {
    titre: "Le Monde de Farland",
    texte: [
      "Farland (le monde de Núrion) est un cadre de campagne de fantasy sombre, gratuit et compatible D&D 5e. On le décrit comme un mélange entre Le Seigneur des Anneaux et Le Trône de Fer : un monde héroïque classique auquel on a ajouté la noirceur, la trahison et le désespoir.",
      "Il y a des siècles, le monde a été CONQUIS PAR LE MAL. Le dieu noir Vornoth et ses serviteurs ont soumis les peuples libres. Le continent central a été découpé en SEPT ROYAUMES, chacun gouverné par un Seigneur du Péché — l'incarnation vivante d'un des sept péchés capitaux.",
      "Aujourd'hui, une Libération est en cours. Plusieurs royaumes se sont affranchis mais vacillent au bord de l'effondrement, et la guerre totale contre les puissances des ténèbres approche. C'est dans ce climat que les héros interviennent."
    ],
    monnaie: "IMPORTANT — Monnaie : Farland utilise l'ÉTALON ARGENT. Une pièce d'argent (pa) vaut ce que vaut une pièce d'or (po) dans le D&D standard. Ordre décroissant : platine (pp) > argent (pa) > cuivre (pc) > étain (pe / 'tp'). Si un prix du manuel dit « po », lisez « pa » dans Farland."
  },

  seigneursDuPeche: {
    titre: "Les Sept Seigneurs du Péché",
    texte: "Chaque royaume conquis est dominé par un Seigneur incarnant un péché capital, servant du dieu noir Vornoth.",
    liste: [
      { peche: "Orgueil (Pride)",      note: "Le plus arrogant des tyrans." },
      { peche: "Envie (Envy)",         note: "Convoite ce que possèdent les autres." },
      { peche: "Colère (Wrath)",       note: "Règne par la fureur et la guerre." },
      { peche: "Paresse (Sloth)",      note: "Seigneur du royaume de ZELAND (cf. « Les Tours de la Nuit »). Sa négligence laisse pourrir la terre et prospérer les morts-vivants." },
      { peche: "Avarice (Greed)",      note: "Amasse et affame ses sujets." },
      { peche: "Gourmandise (Gluttony)", note: "Dévore les ressources de son royaume." },
      { peche: "Luxure (Lust)",        note: "Corrompt par le désir et la manipulation." }
    ]
  },

  royaumes: {
    titre: "Royaumes cités dans ces aventures",
    liste: [
      {
        nom: "Le Royaume de Daven",
        texte: "Théâtre de « Ce qui se cache à l'intérieur ». Longtemps ravagé par le mal depuis la Libération, mais le village d'Eichen, isolé en bordure d'une grande forêt et loin des routes commerciales, avait été jusque-là épargné — avant que d'étranges disparitions et des cadavres décapités ne commencent."
      },
      {
        nom: "Le Royaume de Zeland",
        texte: "Théâtre de « Les Tours de la Nuit ». Gouverné par le Seigneur de la Paresse. Sa capitale des patrouilles est Hestor. Autrefois, les Zelandais enterraient leurs morts au sommet des Tours de l'Attente, sur la Plaine des Batailles (Battleplain), pendant un an, avant de jeter les os dans une fosse à la base de la tour. Le camp rebelle de Loch Brech survit au nord."
      }
    ]
  },

  dieux: {
    titre: "Les Divinités de Farland",
    texte: "Le panthéon (Grandes Divinités). Les prêtres et cultistes rencontrés dans ces aventures servent l'un de ces dieux.",
    bons: {
      titre: "Dieux BONS",
      liste: [
        { nom: "Heshtail", dom: "Le Père, dieu du soleil, de la lumière et des serments." },
        { nom: "Bestra", dom: "Déesse de l'amour, de la beauté et de la nature. Très vénérée par les gens simples (symboles de Bestra apparaissent dans les deux aventures : prêtresse Katrina Rabe à Eichen, tente-temple au camp de Loch Brech)." },
        { nom: "Kantor Tal-Allustiel", dom: "Dieu elfique de la magie, de la connaissance et de la musique. Jadis pair des dieux les plus anciens." },
        { nom: "Khuldul Rockcarver", dom: "Dieu nain de la forge, de la pierre et de l'artisanat." },
        { nom: "Khuckduck Gemcutter", dom: "Dieu gnome des gemmes, de l'ingéniosité et de l'invention." },
        { nom: "Bunga Proudfoot", dom: "Dieu halfelin du foyer, du réconfort et de la chance." }
      ]
    },
    neutres: {
      titre: "Dieux NEUTRES",
      liste: [
        { nom: "Neltak", dom: "Dieu de la nature sauvage, des tempêtes et de la survie (prêtre Boris Whiteanvil à Eichen)." },
        { nom: "Dekk", dom: "Dieu du voyage, du commerce et du hasard. Patron le plus courant des druides, qui prétendent avoir suivi l'exemple de neutralité absolue de Neltak." },
        { nom: "Bel", dom: "Dieu de la guerre, de la loi et de l'ordre martial." }
      ]
    },
    mauvais: {
      titre: "Dieux MAUVAIS",
      liste: [
        { nom: "Vornoth", dom: "LE dieu noir, le plus jeune et le plus terrible des dieux du Mal. Dans la Langue Sombre : Vorna'ith, « Dieu des Dieux ». Né lorsque la Triade Voilée — Lagur l'Archtyran, Grlarshh le Malade, et Soggoth le Calamiteux — combina ses pouvoirs. Maître de tous les êtres les plus vils du plan mortel. Le monument orc de la tombe (aventure 1) lui est dédié." },
        { nom: "Grlarshh (le Malade / le Diseur de Secrets Sombres)", dom: "Dieu déchu des secrets interdits, de la maladie et de la corruption. Jadis pair des plus anciens dieux, il a sombré à cause de sa longue guerre contre Vornoth. C'est LUI que sert le culte des Morgenstein dans « Ce qui se cache à l'intérieur »." }
      ]
    }
  },

  races: {
    titre: "Peuples jouables",
    texte: "Farland utilise les races classiques de D&D 5e avec une saveur sombre. Dans ces aventures on croise surtout des humains, quelques demi-orcs et nains.",
    liste: [
      "Humains — dominants dans les royaumes de Daven et Zeland (Eichen est humain à 95 %, demi-orc à 5 %).",
      "Nains — artisans et ermites (ex. Oscar Drok, le chasseur reclus).",
      "Demi-orcs — intégrés dans certains villages (ex. Conrad Smithstan, forgeron d'Eichen).",
      "Elfes, Gnomes, Halfelins — présents dans le monde, chacun avec sa divinité tutélaire (voir panthéon).",
      "Peuples sombres (« dark folk ») — orcs, gobelins, hobgobelins, kobolds : serviteurs des Seigneurs du Péché, croisés en patrouille."
    ]
  },

  langues: {
    titre: "Langues courantes",
    liste: [
      "Kelevan — le « commun » humain des royaumes.",
      "Kingdom Common — langue commune des royaumes libres.",
      "Dark Speech (Langue Sombre) — parlée par les serviteurs du mal et les orcs ; runes anciennes de la tombe orc.",
      "Infernal — langue des cultes et des créatures extraplanaires (les prières à Grlarshh).",
      "Nain, Elfique, etc. — langues raciales classiques."
    ]
  }
};


/* ============================================================
   BESTIAIRE & PNJ — stat blocks
   - Créatures propres à Farland : reprises fidèlement des PDF.
   - Créatures « MM p. XXX » : statistiques du SRD 5.1 (OGL),
     fournies pour rendre l'app autonome en voiture.
   Chaque entrée : id, nom, type, cr, tags, ac, pv, vitesse,
   stats{for,dex,con,int,sag,cha}, traits[], actions[], notes.
   ============================================================ */

window.BESTIARY = [

  /* ---------- Aventure 1 : créatures spéciales ---------- */

/* ===== Moteur de dés ===== */
window.Dice = (function () {
  function rollDie(sides) { return Math.floor(Math.random() * sides) + 1; }

  // Lance n dés à f faces, renvoie {rolls, sum}
  function roll(n, sides) {
    const rolls = [];
    for (let i = 0; i < n; i++) rolls.push(rollDie(sides));
    return { rolls, sum: rolls.reduce((a, b) => a + b, 0) };
  }

  // d20 avec modificateur + avantage/désavantage
  // mode: 'normal' | 'adv' | 'dis'
  function d20(mod = 0, mode = 'normal') {
    const a = rollDie(20), b = rollDie(20);
    let kept = a, other = null;
    if (mode === 'adv')  { kept = Math.max(a, b); other = Math.min(a, b); }
    if (mode === 'dis')  { kept = Math.min(a, b); other = Math.max(a, b); }
    return {
      natural: kept, other, mod,
      total: kept + mod,
      crit: kept === 20, fail: kept === 1, mode
    };
  }

  // parse une expression type "2d6+3", "d20", "1d8-1", "4d4"
  function parse(expr) {
    const m = String(expr).replace(/\s+/g, '').toLowerCase()
      .match(/^(\d*)d(\d+)([+-]\d+)?$/);
    if (!m) return null;
    const n = m[1] ? parseInt(m[1], 10) : 1;
    const sides = parseInt(m[2], 10);
    const mod = m[3] ? parseInt(m[3], 10) : 0;
    if (n < 1 || n > 100 || sides < 2 || sides > 1000) return null;
    return { n, sides, mod };
  }

  function rollExpr(expr) {
    const p = parse(expr);
    if (!p) return null;
    const r = roll(p.n, p.sides);
    return { ...p, rolls: r.rolls, total: r.sum + p.mod, expr };
  }

  return { roll, d20, rollExpr, parse, rollDie };
})();

      const sides = +b.dataset.die, n = +(b.dataset.n||1);
      const r = Dice.roll(n, sides);
      $("#d20-out").innerHTML = `<div class="total">${r.sum}</div><div class="detail">${n}d${sides} : [${r.rolls.join(", ")}]</div>`;
      pushLog(`${n}d${sides}`, r.sum, `[${r.rolls.join(", ")}]`); renderLog();
    }));
    $("#roll-custom").addEventListener("click", rollCustom);
    $("#custom-expr").addEventListener("keydown",(e)=>{ if(e.key==="Enter") rollCustom(); });
    $("#clear-log").addEventListener("click",()=>{ diceLog=[]; LS.set("diceLog",diceLog); renderLog(); });
    renderLog();
  }

  function rollCustom() {
    const expr = $("#custom-expr").value.trim();
    const r = Dice.rollExpr(expr);
    if (!r) { hint("Format invalide (ex : 2d6+3)"); return; }
    $("#d20-out").innerHTML = `<div class="total">${r.total}</div><div class="detail">${esc(expr)} : [${r.rolls.join(", ")}]${r.mod?` ${signed(r.mod)}`:""}</div>`;
    pushLog(expr, r.total, `[${r.rolls.join(", ")}]`); renderLog();
  }

  function renderLog() {
    const el = $("#roll-log"); if (!el) return;
    if (!diceLog.length) { el.innerHTML = `<div class="muted small">Aucun jet.</div>`; return; }
    el.innerHTML = diceLog.map((r)=>`<div class="row"><span>${esc(r.label)} <span class="muted small">${esc(r.detail)}</span></span><b>${r.total}</b></div>`).join("");
  }

  // =====================================================================
  //  VUE PERSONNAGES
  // =====================================================================
  const ABILS = [["for","FOR"],["dex","DEX"],["con","CON"],["int","INT"],["sag","SAG"],["cha","CHA"]];

  function allCharacters() {
    const custom = LS.get("customChars", []);
    return [...PREGENS, ...custom];
  }

  function renderPersoList() {
    const chars = allCharacters();
    $("#view-perso").innerHTML = `
      <div class="card">
        <h2 style="margin-top:0;color:var(--accent)">Fiches de personnage</h2>
        <p class="muted small">Accès rapide aux héros. Touchez une caractéristique pour lancer un jet de d20 avec son modificateur.</p>
        <button class="btn-accent btn-block" id="new-char">+ Nouveau personnage</button>
      </div>
      ${chars.map((c)=>`
        <button class="pick" data-char="${c.id}">
          <h3>${esc(c.nom)}</h3>
          <div class="meta">${esc(c.classe)} · ${esc(c.race)} · PV ${c.pv} · CA ${c.ca}</div>
        </button>`).join("")}`;
    $("#new-char").addEventListener("click", newCharacterForm);
    $$("#view-perso [data-char]").forEach((b)=>b.addEventListener("click",()=>renderCharSheet(b.dataset.char)));
  }

  function renderCharSheet(id) {
    const c = byId(allCharacters(), id);
    if (!c) return renderPersoList();
    const isCustom = LS.get("customChars", []).some((x)=>x.id===id);

    const abilGrid = `<div class="abil-grid">${ABILS.map(([k,lab])=>{
      const m = abilMod(c.stats[k]);
      return `<div class="abil" data-abil="${k}" data-score="${c.stats[k]}"><div class="name">${lab}</div><div class="score">${c.stats[k]}</div><div class="mod">${signed(m)}</div></div>`;
    }).join("")}</div>`;

    const attaques = (c.attaques||[]).map((a)=>
      `<div class="kv"><b>${esc(a.nom)}</b> — ${a.bonus!=null?`${signed(a.bonus)} à toucher · `:""}${esc(a.degats)} <button class="chip roll" data-atk="${a.bonus!=null?a.bonus:0}" data-name="${esc(a.nom)}">🎲 att.</button></div>`
    ).join("");

    const sorts = (c.sorts&&c.sorts.length)?`<div class="section-title">Sorts</div><ul>${c.sorts.map((s)=>`<li>${esc(s)}</li>`).join("")}</ul>`:"";
    const caps = (c.capacites&&c.capacites.length)?`<div class="section-title">Capacités</div><ul>${c.capacites.map((s)=>`<li>${esc(s)}</li>`).join("")}</ul>`:"";
    const comps = (c.competences&&c.competences.length)?`<div class="section-title">Compétences maîtrisées</div><div class="chip-list">${c.competences.map((s)=>`<span class="chip">${esc(s)}</span>`).join("")}</div>`:"";
    const sauv = (c.jetsSauv&&c.jetsSauv.length)?`<div class="kv"><b>JS maîtrisés :</b> ${c.jetsSauv.map((k)=>k.toUpperCase()).join(", ")}</div>`:"";
    const spellHdr = c.dcSort?`<div class="kv"><b>DD des sorts :</b> ${c.dcSort} · <b>Attaque de sort :</b> ${signed(c.attaqueSort)}</div>`:"";

    $("#view-perso").innerHTML = `
      <div class="btn-row" style="margin-bottom:12px">
        <button class="btn-ghost" id="back-perso">‹ Personnages</button>
        ${isCustom?`<button class="btn-ghost" id="del-char" style="margin-left:auto;color:var(--accent-2)">Supprimer</button>`:""}
      </div>
      <div class="card">
        <h2 style="margin:0 0 2px;color:var(--accent)">${esc(c.nom)}</h2>
        <div class="muted">${esc(c.classe)} · ${esc(c.race)}</div>
        <div class="stat-line">
          <div class="box"><div class="k">Points de vie</div><div class="v">${c.pv}</div></div>
          <div class="box"><div class="k">Classe d'armure</div><div class="v">${c.ca}</div></div>
          <div class="box"><div class="k">Initiative</div><div class="v">${signed(c.init||abilMod(c.stats.dex))}</div></div>
          <div class="box"><div class="k">Maîtrise</div><div class="v">${signed(c.maitrise||2)}</div></div>
        </div>
        <div class="section-title">Caractéristiques — touchez pour lancer</div>
        ${abilGrid}
        ${sauv}
        ${spellHdr}
      </div>
      ${attaques?`<div class="card"><div class="section-title" style="margin-top:0">Attaques</div>${attaques}</div>`:""}
      ${(comps||caps||sorts)?`<div class="card">${comps}${caps}${sorts}</div>`:""}
      ${c.equipement?`<div class="card"><div class="section-title" style="margin-top:0">Équipement</div><p class="small">${esc(c.equipement)}</p></div>`:""}
      ${c.notes?`<div class="card small muted">💡 ${esc(c.notes)}</div>`:""}
      <div class="dice-result" id="char-roll" style="display:none"></div>`;

    $("#back-perso").addEventListener("click", renderPersoList);
    if (isCustom) $("#del-char").addEventListener("click", ()=>{
      if (!confirm("Supprimer ce personnage ?")) return;
      LS.set("customChars", LS.get("customChars",[]).filter((x)=>x.id!==id));
      renderPersoList();
    });
    $$("#view-perso [data-abil]").forEach((b)=>b.addEventListener("click",()=>{
      const m = abilMod(+b.dataset.score);
      const r = Dice.d20(m, d20mode);
      showCharRoll(`Jet de ${b.querySelector(".name").textContent} (${signed(m)})`, r);
    }));
    $$("#view-perso [data-atk]").forEach((b)=>b.addEventListener("click",()=>{
      const r = Dice.d20(+b.dataset.atk, d20mode);
      showCharRoll(`${b.dataset.name} — jet d'attaque (${signed(+b.dataset.atk)})`, r);
    }));
  }

  function showCharRoll(label, r) {
    const el = $("#char-roll"); if (!el) return;
    const cls = r.crit ? "crit" : r.fail ? "fail" : "";
    el.style.display = "block";
    el.innerHTML = `<div class="total ${cls}">${r.total}</div><div class="detail">${esc(label)} · dé ${r.natural}${r.crit?" ⭐":r.fail?" 💀":""}</div>`;
    pushLog(label, r.total, `dé ${r.natural}`);
    el.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  function newCharacterForm() {
    $("#view-perso").innerHTML = `
      <div class="btn-row" style="margin-bottom:12px"><button class="btn-ghost" id="cancel-new">‹ Annuler</button></div>
      <div class="card">
        <h2 style="margin-top:0;color:var(--accent)">Nouveau personnage</h2>
        <label class="small muted">Nom</label><input type="text" id="f-nom" class="search" />
        <label class="small muted">Classe & niveau</label><input type="text" id="f-classe" class="search" placeholder="ex : Barde niv. 2" />
        <label class="small muted">Race</label><input type="text" id="f-race" class="search" />
        <div class="stat-line">
          <div class="box"><div class="k">PV</div><input type="number" id="f-pv" value="10" style="width:64px"></div>
          <div class="box"><div class="k">CA</div><input type="number" id="f-ca" value="12" style="width:64px"></div>
        </div>
        <div class="section-title">Caractéristiques</div>
        <div class="abil-grid">${ABILS.map(([k,lab])=>`<div class="abil"><div class="name">${lab}</div><input type="number" id="f-${k}" value="10" style="width:100%;text-align:center"></div>`).join("")}</div>
        <label class="small muted">Compétences maîtrisées (séparées par des virgules)</label><input type="text" id="f-comp" class="search" />
        <label class="small muted">Notes / équipement</label><input type="text" id="f-notes" class="search" />
        <button class="btn-accent btn-block" id="save-char">Enregistrer</button>
      </div>`;
    $("#cancel-new").addEventListener("click", renderPersoList);
    $("#save-char").addEventListener("click", ()=>{
      const stats = {}; ABILS.forEach(([k])=>stats[k] = parseInt($("#f-"+k).value,10)||10);
      const c = {
        id: "cust-" + Date.now(),
        nom: $("#f-nom").value.trim() || "Sans nom",
        classe: $("#f-classe").value.trim() || "Aventurier",
        race: $("#f-race").value.trim() || "—",
        pv: parseInt($("#f-pv").value,10)||10,
        ca: parseInt($("#f-ca").value,10)||12,
        maitrise: 2, stats,
        competences: $("#f-comp").value.split(",").map((s)=>s.trim()).filter(Boolean),
        notes: $("#f-notes").value.trim()
      };
      const custom = LS.get("customChars", []); custom.push(c); LS.set("customChars", custom);
      renderCharSheet(c.id);
    });
  }

  // =====================================================================
  //  VUE BESTIAIRE
  // =====================================================================
  let bestFilter = "";

  function renderBestiary() {
    const q = bestFilter.toLowerCase();
    const list = BESTIARY.filter((m)=>
      !q || m.nom.toLowerCase().includes(q) || m.type.toLowerCase().includes(q) ||
      (m.tags||[]).some((t)=>t.includes(q)));
    $("#view-bestiaire").innerHTML = `
      <div class="card">
        <h2 style="margin-top:0;color:var(--accent)">Bestiaire & PNJ</h2>
        <input type="text" class="search" id="best-search" placeholder="Rechercher (nom, type, aventure1, mort-vivant…)" value="${esc(bestFilter)}">
        <div class="btn-row">
          <button class="chip roll" data-filter="">Tous</button>
          <button class="chip roll" data-filter="aventure1">Aventure 1</button>
          <button class="chip roll" data-filter="aventure2">Aventure 2</button>
          <button class="chip roll" data-filter="mort-vivant">Morts-vivants</button>
          <button class="chip roll" data-filter="boss">Boss</button>
        </div>
      </div>
      <div id="best-list">${list.map(bestiaryCard).join("") || `<div class="card muted center">Aucune créature.</div>`}</div>`;
    const s = $("#best-search");
    s.addEventListener("input",()=>{ bestFilter = s.value; const pos = s.selectionStart;
      const listEl = $("#best-list");
      const q2 = bestFilter.toLowerCase();
      const l2 = BESTIARY.filter((m)=>!q2||m.nom.toLowerCase().includes(q2)||m.type.toLowerCase().includes(q2)||(m.tags||[]).some((t)=>t.includes(q2)));
      listEl.innerHTML = l2.map(bestiaryCard).join("") || `<div class="card muted center">Aucune créature.</div>`;
      bindBestiaryDetails();
    });
    $$("#view-bestiaire [data-filter]").forEach((b)=>b.addEventListener("click",()=>{ bestFilter=b.dataset.filter; renderBestiary(); }));
    bindBestiaryDetails();
  }

  function bestiaryCard(m) {
    const stats = ABILS.map(([k,lab])=>`<div class="box"><div class="k">${lab}</div><div class="v" style="font-size:16px">${m.stats[k]} <span class="muted" style="font-size:12px">${signed(abilMod(m.stats[k]))}</span></div></div>`).join("");
    const traits = (m.traits&&m.traits.length)?`<div class="section-title">Traits</div><ul>${m.traits.map((t)=>`<li>${esc(t)}</li>`).join("")}</ul>`:"";
    const actions = (m.actions&&m.actions.length)?`<div class="section-title">Actions</div><ul>${m.actions.map((t)=>`<li>${esc(t)}</li>`).join("")}</ul>`:"";
    return `<details id="mob-${m.id}">
      <summary>${esc(m.nom)} <span class="tag cr">FP ${esc(m.cr)}</span></summary>
      <div class="muted small">${esc(m.type)}</div>
      <div class="stat-line" style="margin-top:8px">
        <div class="box"><div class="k">CA</div><div class="v" style="font-size:16px">${esc(m.ac)}</div></div>
        <div class="box"><div class="k">PV</div><div class="v" style="font-size:16px">${esc(m.pv)}</div></div>
        <div class="box"><div class="k">Vitesse</div><div class="v" style="font-size:14px">${esc(m.vitesse)}</div></div>
      </div>
      <div class="stat-line">${stats}</div>
      ${m.comp?`<div class="kv"><b>Comp. :</b> ${esc(m.comp)}</div>`:""}
      ${m.sens?`<div class="kv"><b>Sens :</b> ${esc(m.sens)}</div>`:""}
      ${m.langues?`<div class="kv"><b>Langues :</b> ${esc(m.langues)}</div>`:""}
      ${traits}${actions}
      ${m.notes?`<div class="card small muted" style="margin-top:10px">💡 ${esc(m.notes)}</div>`:""}
    </details>`;
  }
  function bindBestiaryDetails(){ /* détails natifs, rien à lier */ }

  function openBestiaryEntry(id) {
    showTab("bestiaire");
    bestFilter = "";
    renderBestiary();
    const d = $("#mob-"+id);
    if (d) { d.open = true; d.scrollIntoView({ behavior:"smooth", block:"start" }); }
  }

  // =====================================================================
  //  VUE UNIVERS
  // =====================================================================
  function renderUnivers() {
    const L = FARLAND_LORE;
    const godBlock = (g) => `<details><summary>${esc(g.titre)}</summary>${g.liste.map((d)=>`<div class="kv"><b>${esc(d.nom)}</b> — ${esc(d.dom)}</div>`).join("")}</details>`;
    $("#view-univers").innerHTML = `
      <div class="card">
        <h2 style="margin-top:0;color:var(--accent)">${esc(L.intro.titre)}</h2>
        ${L.intro.texte.map((p)=>`<p>${esc(p)}</p>`).join("")}
        <div class="card" style="background:var(--bg-3);border-color:var(--accent)"><b style="color:var(--accent)">💰 Monnaie</b><p class="small" style="margin:6px 0 0">${esc(L.intro.monnaie)}</p></div>
      </div>

      <div class="card">
        <div class="section-title" style="margin-top:0">${esc(L.seigneursDuPeche.titre)}</div>
        <p class="small muted">${esc(L.seigneursDuPeche.texte)}</p>
        ${L.seigneursDuPeche.liste.map((s)=>`<div class="kv"><b>${esc(s.peche)}</b> — ${esc(s.note)}</div>`).join("")}
      </div>

      <div class="card">
        <div class="section-title" style="margin-top:0">${esc(L.royaumes.titre)}</div>
        ${L.royaumes.liste.map((r)=>`<details><summary>${esc(r.nom)}</summary><p class="small">${esc(r.texte)}</p></details>`).join("")}
      </div>

      <div class="card">
        <div class="section-title" style="margin-top:0">${esc(L.dieux.titre)}</div>
        <p class="small muted">${esc(L.dieux.texte)}</p>
        ${godBlock(L.dieux.bons)}
        ${godBlock(L.dieux.neutres)}
        ${godBlock(L.dieux.mauvais)}
      </div>

      <div class="card">
        <div class="section-title" style="margin-top:0">${esc(L.races.titre)}</div>
        <p class="small muted">${esc(L.races.texte)}</p>
        <ul class="small">${L.races.liste.map((r)=>`<li>${esc(r)}</li>`).join("")}</ul>
      </div>

      <div class="card">
        <div class="section-title" style="margin-top:0">${esc(L.langues.titre)}</div>
        <ul class="small">${L.langues.liste.map((r)=>`<li>${esc(r)}</li>`).join("")}</ul>
      </div>

      <div class="card small muted center">
        Univers du <b>Monde de Farland</b> — cadre gratuit compatible D&D 5e (farlandworld.com).<br>
        Contenu résumé pour l'usage du MJ.
      </div>`;
  }

  // =====================================================================
  //  INITIALISATION
  // =====================================================================
  renderGameTab();
  renderDice();
  renderPersoList();
  renderBestiary();
  renderUnivers();
  showTab(LS.get("lastTab", "jeu"));

  // expose pour debug éventuel
  window.FarlandApp = { showTab, openScenario };
})();

</script>
</body>
</html>
