<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Horloge Alphabet</title>
<style>
  :root{
    color-scheme: dark;
    --p1: #2563eb;
    --p2: #dc2626;
    --bg: #0b0c10;
    --panel: #14161c;
    --text: #f5f6f8;
    --muted: #9aa1ac;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; user-select: none; touch-action: manipulation;
  }
  #app{
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    height: 100dvh; width: 100vw;
  }
  .player{
    flex: 1 1 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    transition: background-color .15s ease;
    padding: 1rem;
    min-height: 0;
  }
  .player.active{ filter: brightness(1); }
  .player.inactive{ filter: brightness(0.55); }
  #p1{ background: var(--p1); transform: rotate(180deg); }
  #p2{ background: var(--p2); }
  .player.timedout{ background: #3a0d0d !important; }
  .player.timedout.p1bg{ background: #0d1a3a !important; }

  .name{
    font-size: clamp(1rem, 3vw, 1.8rem);
    font-weight: 600;
    opacity: .9;
    padding: .2rem .6rem;
    border-radius: .5rem;
    outline: none;
    max-width: 90%;
    text-align: center;
  }
  .name:focus{ background: rgba(255,255,255,.15); }

  .time{
    font-variant-numeric: tabular-nums;
    font-size: clamp(3rem, 16vw, 9rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: .02em;
    margin: .2rem 0;
  }

  .score-row{
    display:flex; align-items:center; gap: .8rem;
    margin-top: .3rem;
  }
  .score-btn{
    width: 2.6rem; height: 2.6rem; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.5);
    background: rgba(0,0,0,.25);
    color: var(--text);
    font-size: 1.4rem; font-weight: 700;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .score-btn:active{ background: rgba(0,0,0,.5); }
  .score{
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800;
    min-width: 2.4ch; text-align:center;
  }

  #centerBar{
    flex: 0 0 auto;
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    gap: .5rem; flex-wrap: wrap;
    padding: .5rem .6rem;
    z-index: 5;
    border-top: 1px solid #000; border-bottom: 1px solid #000;
  }
  .ctrl-btn{
    background: #22252e; color: var(--text);
    border: 1px solid #333; border-radius: .6rem;
    padding: .55rem .8rem; font-size: 1.1rem;
    cursor: pointer; display:flex; align-items:center; gap:.3rem;
  }
  .ctrl-btn:active{ background: #2c303a; }
  .letter-box{
    display:flex; align-items:center; gap:.4rem;
    background:#22252e; border:1px solid #333; border-radius:.6rem;
    padding: .3rem .5rem;
  }
  .letter-box button{
    background:transparent; border:none; color:var(--text);
    font-size:1.3rem; cursor:pointer; padding:.2rem .5rem;
  }
  .letter{
    font-size: 1.4rem; font-weight: 800; min-width: 1.6ch; text-align:center;
  }

  #overlay{
    position: fixed; inset:0; background: rgba(0,0,0,.85);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 1.2rem; z-index: 20; text-align:center; padding: 2rem;
  }
  #overlay h1{ font-size: clamp(1.5rem, 6vw, 3rem); margin:0; }
  #overlay p{ color: var(--muted); font-size: 1.1rem; margin:0; }
  .big-btn{
    background: #2563eb; color:white; border:none; border-radius: .8rem;
    padding: .9rem 1.6rem; font-size: 1.2rem; cursor:pointer; font-weight:600;
  }

  #settings{
    position: fixed; inset:0; background: rgba(0,0,0,.9);
    display:flex; align-items:center; justify-content:center; z-index: 30;
  }
  #settings .box{
    background: var(--panel); border-radius: 1rem; padding: 1.5rem;
    width: min(420px, 92vw); display:flex; flex-direction:column; gap: 1rem;
  }
  #settings label{ font-size:.9rem; color: var(--muted); display:flex; flex-direction:column; gap:.3rem; }
  #settings input{
    background: #0b0c10; border: 1px solid #333; color: var(--text);
    border-radius: .5rem; padding: .6rem; font-size: 1rem;
  }
  #settings .row{ display:flex; gap:.7rem; }
  #settings .row2{ display:flex; gap:.7rem; justify-content:flex-end; margin-top:.5rem; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">
  <div class="player" id="p1">
    <div class="score-row">
      <button class="score-btn" data-score="1" data-delta="-1">−</button>
      <div class="score" id="score1">0</div>
      <button class="score-btn" data-score="1" data-delta="1">+</button>
    </div>
    <div class="name" id="name1" contenteditable="true" spellcheck="false">Joueur 1</div>
    <div class="time" id="time1">05:00</div>
  </div>

  <div id="centerBar">
    <div class="letter-box">
      <button id="letterPrev">‹</button>
      <div class="letter" id="letterDisplay">A</div>
      <button id="letterNext">›</button>
    </div>
    <button class="ctrl-btn" id="playPauseBtn">▶ Départ</button>
    <button class="ctrl-btn" id="resetTimeBtn">⟲ Temps</button>
    <button class="ctrl-btn" id="resetAllBtn">⟲ Tout</button>
    <button class="ctrl-btn" id="settingsBtn">⚙</button>
  </div>

  <div class="player" id="p2">
    <div class="name" id="name2" contenteditable="true" spellcheck="false">Joueur 2</div>
    <div class="time" id="time2">05:00</div>
    <div class="score-row">
      <button class="score-btn" data-score="2" data-delta="-1">−</button>
      <div class="score" id="score2">0</div>
      <button class="score-btn" data-score="2" data-delta="1">+</button>
    </div>
  </div>
</div>

<div id="overlay" class="hidden">
  <h1 id="overlayTitle">Temps écoulé !</h1>
  <p id="overlaySub"></p>
  <button class="big-btn" id="overlayContinue">Continuer</button>
</div>

<div id="settings" class="hidden">
  <div class="box">
    <label>Temps par joueur (minutes)
      <input type="number" id="minutesInput" min="1" max="60" step="1">
    </label>
    <div class="row">
      <label style="flex:1">Nom joueur 1<input type="text" id="nameInput1"></label>
      <label style="flex:1">Nom joueur 2<input type="text" id="nameInput2"></label>
    </div>
    <div class="row2">
      <button class="ctrl-btn" id="settingsCancel">Annuler</button>
      <button class="ctrl-btn" id="settingsSave">Enregistrer</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var STORAGE_KEY = "alphabet-timer-state-v1";
  var LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

  function defaultState(){
    return {
      initialMs: 5*60*1000,
      times: { 1: 5*60*1000, 2: 5*60*1000 },
      score: { 1: 0, 2: 0 },
      names: { 1: "Joueur 1", 2: "Joueur 2" },
      active: null,      // 1 or 2
      running: false,
      timedOut: null,     // 1 or 2 when someone hit zero
      letterIndex: 0,
      lastTick: null
    };
  }

  var state = load();

  function load(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      var s = JSON.parse(raw);
      var d = defaultState();
      s = Object.assign(d, s, {
        times: Object.assign({1:d.initialMs,2:d.initialMs}, s.times),
        score: Object.assign({1:0,2:0}, s.score),
        names: Object.assign({1:"Joueur 1",2:"Joueur 2"}, s.names)
      });
      // Account for time elapsed while the page was closed/backgrounded
      if(s.running && s.active && s.lastTick){
        var elapsed = Date.now() - s.lastTick;
        if(elapsed > 0){
          s.times[s.active] = Math.max(0, s.times[s.active] - elapsed);
          if(s.times[s.active] <= 0 && !s.timedOut){
            s.timedOut = s.active;
            s.score[other(s.active)] += 1;
            s.running = false;
            s.active = null;
          }
        }
      }
      s.lastTick = Date.now();
      return s;
    }catch(e){ return defaultState(); }
  }

  function save(){
    state.lastTick = Date.now();
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function other(n){ return n === 1 ? 2 : 1; }

  // ---- DOM refs ----
  var el = {
    time1: document.getElementById("time1"),
    time2: document.getElementById("time2"),
    score1: document.getElementById("score1"),
    score2: document.getElementById("score2"),
    name1: document.getElementById("name1"),
    name2: document.getElementById("name2"),
    p1: document.getElementById("p1"),
    p2: document.getElementById("p2"),
    playPauseBtn: document.getElementById("playPauseBtn"),
    resetTimeBtn: document.getElementById("resetTimeBtn"),
    resetAllBtn: document.getElementById("resetAllBtn"),
    settingsBtn: document.getElementById("settingsBtn"),
    overlay: document.getElementById("overlay"),
    overlayTitle: document.getElementById("overlayTitle"),
    overlaySub: document.getElementById("overlaySub"),
    overlayContinue: document.getElementById("overlayContinue"),
    settings: document.getElementById("settings"),
    minutesInput: document.getElementById("minutesInput"),
    nameInput1: document.getElementById("nameInput1"),
    nameInput2: document.getElementById("nameInput2"),
    settingsSave: document.getElementById("settingsSave"),
    settingsCancel: document.getElementById("settingsCancel"),
    letterDisplay: document.getElementById("letterDisplay"),
    letterPrev: document.getElementById("letterPrev"),
    letterNext: document.getElementById("letterNext")
  };

  function fmt(ms){
    if(ms < 0) ms = 0;
    var totalSec = Math.ceil(ms/1000);
    var m = Math.floor(totalSec/60);
    var s = totalSec % 60;
    return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  }

  function render(){
    el.time1.textContent = fmt(state.times[1]);
    el.time2.textContent = fmt(state.times[2]);
    el.score1.textContent = state.score[1];
    el.score2.textContent = state.score[2];
    if(document.activeElement !== el.name1) el.name1.textContent = state.names[1];
    if(document.activeElement !== el.name2) el.name2.textContent = state.names[2];

    el.p1.classList.toggle("active", state.active === 1);
    el.p1.classList.toggle("inactive", state.active === 2);
    el.p2.classList.toggle("active", state.active === 2);
    el.p2.classList.toggle("inactive", state.active === 1);
    el.p1.classList.toggle("timedout", state.timedOut === 1);
    el.p2.classList.toggle("timedout", state.timedOut === 2);

    el.playPauseBtn.textContent = state.running ? "⏸ Pause" : (state.active ? "▶ Reprendre" : "▶ Départ");
    el.letterDisplay.textContent = LETTERS[state.letterIndex];

    if(state.timedOut){
      el.overlayTitle.textContent = "⏰ Temps écoulé !";
      el.overlaySub.textContent = state.names[state.timedOut] + " n'a plus de temps — point pour " + state.names[other(state.timedOut)] + ".";
      el.overlay.classList.remove("hidden");
    } else {
      el.overlay.classList.add("hidden");
    }
  }

  function tick(){
    if(state.running && state.active && !state.timedOut){
      var now = Date.now();
      var elapsed = now - (state.lastTick || now);
      state.times[state.active] = Math.max(0, state.times[state.active] - elapsed);
      state.lastTick = now;
      if(state.times[state.active] <= 0){
        state.timedOut = state.active;
        state.score[other(state.active)] += 1;
        state.running = false;
        state.active = null;
        releaseWakeLock();
        save();
      }
      render();
    }
    requestAnimationFrame(tick);
  }

  function tapHalf(n){
    if(state.timedOut) return;
    var target = other(n);
    if(state.times[target] <= 0) return;
    state.active = target;
    state.running = true;
    state.lastTick = Date.now();
    requestWakeLock();
    save();
    render();
  }

  el.p1.addEventListener("click", function(e){
    if(e.target.closest(".score-btn") || e.target === el.name1) return;
    tapHalf(1);
  });
  el.p2.addEventListener("click", function(e){
    if(e.target.closest(".score-btn") || e.target === el.name2) return;
    tapHalf(2);
  });

  document.querySelectorAll(".score-btn").forEach(function(btn){
    btn.addEventListener("click", function(e){
      e.stopPropagation();
      var n = btn.getAttribute("data-score");
      var d = parseInt(btn.getAttribute("data-delta"), 10);
      state.score[n] = Math.max(0, state.score[n] + d);
      save();
      render();
    });
  });

  [el.name1, el.name2].forEach(function(input, idx){
    var n = idx+1;
    input.addEventListener("click", function(e){ e.stopPropagation(); });
    input.addEventListener("blur", function(){
      var v = input.textContent.trim() || ("Joueur "+n);
      state.names[n] = v;
      save();
      render();
    });
    input.addEventListener("keydown", function(e){
      if(e.key === "Enter"){ e.preventDefault(); input.blur(); }
    });
  });

  el.playPauseBtn.addEventListener("click", function(e){
    e.stopPropagation();
    if(state.timedOut) return;
    if(!state.active){
      // nothing chosen yet: start with player 1 thinking by default
      state.active = 1;
      state.running = true;
    } else {
      state.running = !state.running;
    }
    state.lastTick = Date.now();
    if(state.running) requestWakeLock(); else releaseWakeLock();
    save();
    render();
  });

  el.resetTimeBtn.addEventListener("click", function(e){
    e.stopPropagation();
    if(!confirm("Réinitialiser les deux temps (le score est conservé) ?")) return;
    state.times = { 1: state.initialMs, 2: state.initialMs };
    state.active = null;
    state.running = false;
    state.timedOut = null;
    releaseWakeLock();
    save();
    render();
  });

  el.resetAllBtn.addEventListener("click", function(e){
    e.stopPropagation();
    if(!confirm("Réinitialiser temps ET score ET la lettre ?")) return;
    state.times = { 1: state.initialMs, 2: state.initialMs };
    state.score = { 1: 0, 2: 0 };
    state.active = null;
    state.running = false;
    state.timedOut = null;
    state.letterIndex = 0;
    releaseWakeLock();
    save();
    render();
  });

  el.overlayContinue.addEventListener("click", function(e){
    e.stopPropagation();
    state.timedOut = null;
    save();
    render();
  });

  el.letterPrev.addEventListener("click", function(e){
    e.stopPropagation();
    state.letterIndex = (state.letterIndex - 1 + LETTERS.length) % LETTERS.length;
    save(); render();
  });
  el.letterNext.addEventListener("click", function(e){
    e.stopPropagation();
    state.letterIndex = (state.letterIndex + 1) % LETTERS.length;
    save(); render();
  });

  // ---- Settings panel ----
  el.settingsBtn.addEventListener("click", function(e){
    e.stopPropagation();
    el.minutesInput.value = Math.round(state.initialMs/60000);
    el.nameInput1.value = state.names[1];
    el.nameInput2.value = state.names[2];
    el.settings.classList.remove("hidden");
  });
  el.settingsCancel.addEventListener("click", function(){
    el.settings.classList.add("hidden");
  });
  el.settingsSave.addEventListener("click", function(){
    var minutes = parseFloat(el.minutesInput.value);
    if(!isNaN(minutes) && minutes > 0){
      state.initialMs = minutes * 60 * 1000;
      state.times = { 1: state.initialMs, 2: state.initialMs };
      state.active = null;
      state.running = false;
      state.timedOut = null;
    }
    state.names[1] = el.nameInput1.value.trim() || "Joueur 1";
    state.names[2] = el.nameInput2.value.trim() || "Joueur 2";
    el.settings.classList.add("hidden");
    save();
    render();
  });

  // ---- Wake Lock (keep screen on during the game) ----
  var wakeLock = null;
  function requestWakeLock(){
    if("wakeLock" in navigator){
      navigator.wakeLock.request("screen").then(function(lock){ wakeLock = lock; }).catch(function(){});
    }
  }
  function releaseWakeLock(){
    if(wakeLock){ wakeLock.release().catch(function(){}); wakeLock = null; }
  }
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "visible" && state.running){ requestWakeLock(); }
  });

  render();
  if(state.running) requestWakeLock();
  requestAnimationFrame(tick);
  window.addEventListener("beforeunload", save);
})();
</script>
</body>
</html>
